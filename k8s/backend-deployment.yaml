apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumina-backend
  namespace: lumina
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lumina-backend
  template:
    metadata:
      labels:
        app: lumina-backend
    spec:
      containers:
        - name: backend
          image: lumina-ai/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lumina-secrets
                  key: database_url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lumina-secrets
                  key: secret_key
            - name: REDIS_URL
              value: "redis://lumina-redis:6379/0"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lumina-backend
  namespace: lumina
spec:
  selector:
    app: lumina-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
