apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumina-redis
  namespace: lumina
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lumina-redis
  template:
    metadata:
      labels:
        app: lumina-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: lumina-redis
  namespace: lumina
spec:
  selector:
    app: lumina-redis
  ports:
    - port: 6379
      targetPort: 6379
