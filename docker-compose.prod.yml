services:
  lumina-api:
    image: ghcr.io/yourorg/lumina:latest
    container_name: lumina
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LUMINA_ENV: production
      AUTH_ENABLED: "true"
      CORS_ORIGINS: "https://yourdomain.com"
      LUMINA_MASTER_KEY: ${LUMINA_MASTER_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - lumina_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
    networks:
      - lumina-net

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: "8G"
    networks:
      - lumina-net

  nginx:
    image: nginx:alpine
    container_name: lumina-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - lumina-api
    networks:
      - lumina-net

volumes:
  lumina_data:
  ollama_data:

networks:
  lumina-net:
    driver: bridge
