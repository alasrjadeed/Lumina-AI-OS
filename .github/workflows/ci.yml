name: Lumina AI OS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
      - name: Run kernel tests
        run: python -m pytest kernel/tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linting tools
        run: pip install ruff
      - name: Run ruff
        run: ruff check backend/app kernel --ignore=E402,F401

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install mypy pydantic
      - name: Run mypy
        run: mypy backend/app kernel --ignore-missing-imports || true

  build-backend:
    runs-on: ubuntu-latest
    needs: [test-kernel, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t lumina-ai-os:latest .

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        run: |
          cd frontend
          npm ci
          npm run build
